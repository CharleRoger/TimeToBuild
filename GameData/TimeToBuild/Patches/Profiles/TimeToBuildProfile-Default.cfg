TimeToBuildProfile
{
	name = Default
	title = #LOC_TimeToBuild_Config_title_Default
	description = #LOC_TimeToBuild_Config_description_Default
	author = Charles Rogers

	MorningTime = 16200
	AlarmWarningBufferTime = 604800

	BuildTime
	{
		name = Development
		title = #LOC_TimeToBuild_BuildTime_Development_title
		description = #LOC_TimeToBuild_BuildTime_Development_description

		Formula = day + ((day / 180) * 4^-facility_level * dry_cost) / (num_builds + 1)^2
		PerNewPart = true
		Facility = VehicleAssemblyBuilding
		Facility = SpaceplaneHangar
	}
	BuildTime
	{
		name = Assembly
		title = #LOC_TimeToBuild_BuildTime_Assembly_title
		description = #LOC_TimeToBuild_BuildTime_Assembly_description

		Formula = day * 16^-facility_level * dry_mass^(2/3) * dry_cost^(1/3)
		PerNewPart = true
		Facility = VehicleAssemblyBuilding
		Facility = SpaceplaneHangar
	}
	BuildTime
	{
		name = Refurbishment
		title = #LOC_TimeToBuild_BuildTime_Refurbishment_title
		description = #LOC_TimeToBuild_BuildTime_Refurbishment_description

		Formula = (day / 6) * 16^-facility_level * dry_mass^(2/3) * dry_cost^(1/3)
		PerReusedPart = true
		Facility = VehicleAssemblyBuilding
		Facility = SpaceplaneHangar
	}
	BuildTime
	{
		name = Rollout
		title = #LOC_TimeToBuild_BuildTime_Rollout_title
		description = #LOC_TimeToBuild_BuildTime_Rollout_description

		Formula = hour + (day / 48) * 4^-facility_level * wet_mass^(3/4)
		WholeVessel = true
		Facility = Launchpad
		Facility = Runway
	}
}
TimeToBuildProfile
{
	name = Default
	title = #LOC_TimeToBuild_Config_title_Default
	description = #LOC_TimeToBuild_Config_description_Default
	author = Charles Rogers

	MorningTime = 16200
	AlarmWarningBufferTime = 604800

	BuildTime
	{
		name = Development
		title = #LOC_TimeToBuild_BuildTime_Development_title
		description = #LOC_TimeToBuild_BuildTime_Development_description

		PerNewPart = true
		Facility = VehicleAssemblyBuilding
		Facility = SpaceplaneHangar

		TimeFormula
		{
			Work = dry_cost / (num_builds + 1)^2 / 180
			Rate = 4^ResearchAndDevelopment_level / day
			Overhead = day / (num_builds + 1)^2
		}
	}
	BuildTime
	{
		name = Assembly
		title = #LOC_TimeToBuild_BuildTime_Assembly_title
		description = #LOC_TimeToBuild_BuildTime_Assembly_description

		PerNewPart = true
		Facility = VehicleAssemblyBuilding
		Facility = SpaceplaneHangar
		
		TimeFormula
		{
			Work = dry_mass^(2/3) * dry_cost^(1/3)
			Rate = 16^facility_level / day
		}
	}
	BuildTime
	{
		name = Refurbishment
		title = #LOC_TimeToBuild_BuildTime_Refurbishment_title
		description = #LOC_TimeToBuild_BuildTime_Refurbishment_description

		PerReusedPart = true
		Facility = VehicleAssemblyBuilding
		Facility = SpaceplaneHangar

		TimeFormula
		{
			Work = dry_mass^(2/3) * dry_cost^(1/3) / 6
			Rate = 16^facility_level / day
		}
	}
	BuildTime
	{
		name = Rollout
		title = #LOC_TimeToBuild_BuildTime_Rollout_title
		description = #LOC_TimeToBuild_BuildTime_Rollout_description

		WholeVessel = true
		Facility = Launchpad
		Facility = Runway

		TimeFormula
		{
			Work = wet_mass^(3/4) / 48
			Rate = 4^facility_level / day
			Overhead = hour
		}
	}

	ResearchTime
	{
		name = ResearchAndDevelopment
		title = #LOC_TimeToBuild_ResearchTime_ResearchAndDevelopment_title
		description = #LOC_TimeToBuild_ResearchTime_ResearchAndDevelopment_description

		TimeFormula
		{
			Work = 60 * (cost / 5)^(1/2)
			Rate = 4^facility_level / day
		}
	}
}